name: Auto Fetch Timeline Posts

on:
  schedule:
    - cron: '0 * * * *' # 1時間に1回実行（毎時0分）
  workflow_dispatch: # GitHubの画面から手動実行するための設定

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    
    # リポジトリへの書き込み権限を付与
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python fetch_posts.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.md history.json
          # 変更がない場合はエラーにならないようにする
          git commit -m "Auto-update timeline posts" || exit 0
          git push
