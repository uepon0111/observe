name: Timeline Auto Archiver

on:
  schedule:
    # 毎日 日本時間の午前9時（UTC 0時）に実行
    # 頻度を上げたい場合は '0 */6 * * *' (6時間ごと) などに変更してください
    - cron: '0 0 * * *'
  workflow_dispatch: # Actionsタブから手動で実行できるボタンを表示

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリに変更をPushするために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run archiver script
        run: python archiver.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # archiveフォルダとstate.jsonをステージング
          git add archive/ state.json || true
          
          # 変更がある場合のみコミットしてプッシュ
          if ! git diff --staged --quiet; then
            git commit -m "Auto-archive new posts"
            git push
          else
            echo "変更がないためコミットをスキップしました。"
          fi
